# Workspace-level cargo config.
#
# Target-scoped: rustflags here apply ONLY when building for that target.
# Host crates (lamquant-core, gui) keep their default linking.
#
# RP2350 firmware (Hazard3 RISC-V): pull in memory.x and riscv-rt link.x.

[target.riscv32imac-unknown-none-elf]
rustflags = [
    # memory.x defines MEMORY + REGION_ALIAS (must come BEFORE link.x).
    # link.x (from riscv-rt) defines section layout.
    "-C", "link-arg=-Tmemory.x",
    "-C", "link-arg=-Tlink.x",
    "-C", "no-vectorize-loops",
]
