# Workspace-level cargo config.
#
# RP2350 firmware target rustflags are defined in
# `lamquant-firmware/.cargo/config.toml` only. Cargo MERGES (not
# overrides) rustflags arrays across all parent configs, so duplicating
# them here would emit `-Tmemory.x -Tlink.x` twice on the linker
# command line, producing "region 'BOOT_LOADER' already defined".
# Single source of truth lives next to the firmware crate.
