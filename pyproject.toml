[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lamquant"
version = "7.0.0"
description = "Clinical-grade EEG neural codec for RP2350"
requires-python = ">=3.10"
dependencies = [
    "torch>=2.0",
    "numpy>=1.24",
    "scipy>=1.10",
    "mne>=1.5",
    "tqdm>=4.65",
    "snntorch>=0.9",
]

[project.scripts]
lamquant = "lamquant_codec.cli:main"
lamquant-decode = "lamquant_codec.decode:main"
lamquant-export = "lamquant_codec.export:main"
lamquant-visualize = "tools.visualize_pipeline:main"

[project.optional-dependencies]
test = [
    "pytest>=7.4",
    "pytest-cov>=4.1",
    "coverage[toml]>=7.3",
]
dev = [
    "wandb",
    "mlflow",
    "matplotlib>=3.7",
]
gui = [
    "matplotlib>=3.7",
]
# Meta extra for install.sh and user convenience: pulls in everything
# a developer wants locally (test + dev + gui tooling).
all = [
    "pytest>=7.4",
    "pytest-cov>=4.1",
    "coverage[toml]>=7.3",
    "matplotlib>=3.7",
]

# Only lamquant_codec is a real importable library package. The training
# scripts in ai_models/ and firmware/ are run directly (python path/to/
# script.py) and are not installed. tools/ is included because its
# visualize script is registered as a [project.scripts] entry point.
[tool.setuptools.packages.find]
include = ["lamquant_codec*", "tools*"]
exclude = ["tests*", "gui*", "docs*", "build*", "ai_models*", "firmware*", "installer*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]
markers = [
    "slow: marks tests that require model loading or heavy computation",
    "c_host: marks tests that compile and run C code on the host",
]

[tool.coverage.run]
source = ["ai_models", "firmware"]
omit = [
    "tests/benchmarks/*",
    # CLI-only entry points (argparse + main()): not unit-tested directly,
    # exercised via integration tests and actual training runs.
    "ai_models/dataset_sim/audit_dataset.py",
    "ai_models/dataset_sim/generate_validation_split.py",
    "ai_models/dataset_sim/validate_cross_dataset.py",
    "ai_models/dataset_sim/validate_subband.py",
    "ai_models/dataset_sim/edf_to_events.py",
    "ai_models/snn/generate_activity_labels.py",
    "ai_models/snn/train_dlif.py",
    "ai_models/snn/train_dlif_run.py",
    "ai_models/training_cockpit.py",
    "ai_models/oracle/*",
    "ai_models/student/train_student.py",
    "ai_models/student/train_student_subband.py",
    "ai_models/student/train_route_b_decoder.py",
    "ai_models/student/finetune_student.py",
    "ai_models/student/harden_artifacts.py",
]

[tool.coverage.report]
fail_under = 60
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__",
    "raise NotImplementedError",
]
