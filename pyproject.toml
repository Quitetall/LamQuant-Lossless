[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "lamquant-gen6"
version = "6.0.0"
description = "Clinical-grade EEG neural codec for RP2350"
requires-python = ">=3.9"
dependencies = [
    "torch>=2.0",
    "numpy>=1.24",
    "scipy>=1.10",
    "mne>=1.5",
    "tqdm>=4.65",
]

[project.optional-dependencies]
test = [
    "pytest>=7.4",
    "pytest-cov>=4.1",
    "coverage[toml]>=7.3",
]
dev = [
    "wandb",
    "mlflow",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]
markers = [
    "slow: marks tests that require model loading or heavy computation",
    "c_host: marks tests that compile and run C code on the host",
]

[tool.coverage.run]
source = ["ai_models", "firmware"]
omit = [
    "tests/benchmarks/*",
]

[tool.coverage.report]
fail_under = 60
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__",
    "raise NotImplementedError",
]
