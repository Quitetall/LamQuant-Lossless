name: CLA Assistant

# Contributors grant rights under both the repo's open-source license and
# the OH! Tech LLC Enterprise License. See central CLA at:
# https://github.com/Quitetall/LamQuant/blob/main/CLA.md
# Self-hosted (CLA Assistant Lite) — signatures stored in-repo.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: write       # store signature records in-repo
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/Quitetall/LamQuant/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'dependabot[bot],*[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: '✅ All contributors have signed the CLA — thank you!'
          custom-notsigned-prcomment: |
            🚀 Thank you for your contribution, @${{ github.actor }}!

            Before we can review and merge your pull request, we need you to sign our lightweight Contributor License Agreement (CLA).

            The CLA is a **license grant, not a copyright assignment** — you keep full ownership of your work. It allows OH! Tech LLC to distribute your contribution under both the open-source license and a commercial Enterprise License.

            ✍️ **To sign:** read the [CLA Document](https://github.com/Quitetall/LamQuant/blob/main/CLA.md), then post a comment on this PR containing exactly:

            > I have read the CLA Document and I hereby sign the CLA

            (Takes 30 seconds. You only sign once — all future PRs are remembered.)
