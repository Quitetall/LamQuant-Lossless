name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-binaries:
    # Phase D.1: ship both `lml` (codec CLI) and `lamquant` (launcher)
    # per target. The launcher's --gui execs sibling lamquant-gui via
    # current_exe()-relative resolve, so the two CLI binaries are
    # always paired in release artifacts.
    strategy:
      matrix:
        include:
          # lml — codec CLI
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lml
            name: lml-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lml
            name: lml-linux-aarch64
          # Phase 2.3 — fully-static musl build. Single artifact ships
          # everywhere from CentOS 7 to Alpine to embedded host BSPs
          # without libc / glibc-version drift. Uses the same release
          # profile (LTO, strip) as the gnu lane.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: lml
            name: lml-linux-x86_64-musl
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: lml
            name: lml-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: lml
            name: lml-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: lml
            name: lml-windows-x86_64.exe
          # lamquant — top-level launcher (TUI + GUI dispatch)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lamquant
            name: lamquant-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lamquant
            name: lamquant-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: lamquant
            name: lamquant-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: lamquant
            name: lamquant-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: lamquant
            name: lamquant-windows-x86_64.exe
          # Phase 2.3 — fully-static musl `lamquant` launcher.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: lamquant
            name: lamquant-linux-x86_64-musl

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --manifest-path lamquant-core/Cargo.toml --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/${{ matrix.binary }}.exe ${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-gui:
    # Phase D.2: bundle the Tauri GUI per platform via tauri-action.
    # Outputs: linux .deb + .AppImage, macOS .dmg, Windows .msi.
    # Signing certs not configured — bundles ship unsigned for v1; users
    # see the "unverified developer" prompt on first run. Document in
    # INSTALL.md. Linux .deb / .AppImage have no signing requirement.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: ''
            artifact_glob: 'gui/src-tauri/target/release/bundle/{deb,appimage}/*.{deb,AppImage}'
          - os: macos-latest
            args: '--target universal-apple-darwin'
            artifact_glob: 'gui/src-tauri/target/release/bundle/{dmg,macos}/*.{dmg,app.tar.gz}'
          - os: windows-latest
            args: ''
            artifact_glob: 'gui/src-tauri/target/release/bundle/msi/*.msi'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'gui/package-lock.json'

      - name: Install Linux GUI deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Install JS deps
        working-directory: gui
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          args: ${{ matrix.args }}

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: lamquant-gui-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn

  create-release:
    needs: [build-binaries, build-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; > ../SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            SHA256SUMS.txt
          generate_release_notes: true

  publish-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --manifest-path lamquant-core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path lamquant-core/Cargo.toml --features python
      - uses: pypa/gh-action-pypi-publish@v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
