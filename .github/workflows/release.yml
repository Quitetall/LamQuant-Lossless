name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# Reproducible-build envvars (Phase 2.4). SOURCE_DATE_EPOCH is the
# de-facto cross-toolchain timestamp pin: rustc, the linker, ar, zip,
# strip, and softprops/action-gh-release all honour it. We pin it to
# the commit timestamp of the tag (set per-job, see "Pin SOURCE_DATE_EPOCH"
# step below) so re-running the same release tag produces byte-identical
# artifacts. --remap-path-prefix scrubs runner-local absolute paths
# (workspace + target dir, both inside the workspace) from debuginfo.
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "--remap-path-prefix=/home/runner/work=/__w --remap-path-prefix=${{ github.workspace }}=/__w/lamquant"

jobs:
  build-binaries:
    # Phase D.1: ship both `lml` (codec CLI) and `lamquant` (launcher)
    # per target. The launcher's --gui execs sibling lamquant-gui via
    # current_exe()-relative resolve, so the two CLI binaries are
    # always paired in release artifacts.
    strategy:
      matrix:
        include:
          # lml — codec CLI
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lml
            name: lml-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lml
            name: lml-linux-aarch64
          # Phase 2.3 — fully-static musl build. Single artifact ships
          # everywhere from CentOS 7 to Alpine to embedded host BSPs
          # without libc / glibc-version drift. Uses the same release
          # profile (LTO, strip) as the gnu lane.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: lml
            name: lml-linux-x86_64-musl
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: lml
            name: lml-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: lml
            name: lml-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: lml
            name: lml-windows-x86_64.exe
          # lamquant — top-level launcher (TUI + GUI dispatch)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lamquant
            name: lamquant-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lamquant
            name: lamquant-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: lamquant
            name: lamquant-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: lamquant
            name: lamquant-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: lamquant
            name: lamquant-windows-x86_64.exe
          # Phase 2.3 — fully-static musl `lamquant` launcher.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: lamquant
            name: lamquant-linux-x86_64-musl

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the tag's actual commit object — depth 1 is enough since
          # the tag itself is checked out, but be explicit so future
          # SOURCE_DATE_EPOCH computation has the commit timestamp.
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Pin SOURCE_DATE_EPOCH from tag commit
        shell: bash
        # Honoured by rustc, rust-lld, GNU ld, BSD ld, lld, ar, strip,
        # zip, tar, softprops/action-gh-release. Reproducible Builds
        # spec §3.1. Same tag → same epoch → byte-identical artifact.
        run: |
          EPOCH=$(git log -1 --pretty=%ct)
          echo "SOURCE_DATE_EPOCH=$EPOCH" >> "$GITHUB_ENV"
          echo "Pinned SOURCE_DATE_EPOCH=$EPOCH (commit $(git rev-parse --short HEAD))"

      - name: Install cross-compilation tools (aarch64-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --manifest-path lamquant-core/Cargo.toml --release --bin ${{ matrix.binary }} --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/${{ matrix.binary }}.exe ${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.name }}
          fi

      # ────────────────────────────────────────────────────────────────
      # Phase 7.7 — code signing slots. Both stay opt-in via repo
      # secrets so a fork without certs still ships unsigned artifacts
      # without failing the matrix.
      #
      # macOS notarisation (Apple): needs APPLE_ID + APPLE_ID_PASSWORD
      # (app-specific password) + APPLE_TEAM_ID + APPLE_DEVELOPER_ID_CERT
      # (base64 .p12) + APPLE_DEVELOPER_ID_CERT_PASSWORD. Without those
      # secrets the step is silently skipped.
      #
      # Windows Authenticode (Code-signing): needs WINDOWS_PFX_BASE64 +
      # WINDOWS_PFX_PASSWORD. Uses `signtool` from the Windows SDK
      # (pre-installed on github runners).
      # ────────────────────────────────────────────────────────────────
      - name: Notarize (macOS Developer ID)
        if: |
          startsWith(matrix.target, 'aarch64-apple-darwin') ||
          startsWith(matrix.target, 'x86_64-apple-darwin')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_ID_CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        shell: bash
        run: |
          if [[ -z "${APPLE_ID:-}" || -z "${APPLE_DEVELOPER_ID_CERT:-}" ]]; then
            echo "Apple signing secrets not present — skipping notarisation."
            exit 0
          fi
          # Import the Developer ID certificate into a temporary keychain.
          KEYCHAIN_NAME="lamquant-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          echo "$APPLE_DEVELOPER_ID_CERT" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN_NAME" -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          # Sign + notarize the rename'd artifact, then staple ticket.
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application: $APPLE_TEAM_ID" \
            "${{ matrix.name }}"
          ditto -c -k --keepParent "${{ matrix.name }}" "${{ matrix.name }}.zip"
          xcrun notarytool submit "${{ matrix.name }}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          # CLI binaries can't be stapled (only .app / .dmg / .pkg);
          # notarytool's --wait gate is enough — Gatekeeper consults
          # the ticket via online lookup.
          rm -f cert.p12 "${{ matrix.name }}.zip"
          security delete-keychain "$KEYCHAIN_NAME" || true

      - name: Authenticode sign (Windows)
        if: matrix.os == 'windows-latest'
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        shell: pwsh
        run: |
          if (-not $env:WINDOWS_PFX_BASE64) {
            Write-Host "Windows code-signing secrets not present — skipping signtool."
            exit 0
          }
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          # signtool ships in Windows SDK pre-installed on windows-latest.
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
                       Where-Object { $_.FullName -match "x64" } |
                       Select-Object -First 1 -ExpandProperty FullName)
          & $signtool sign /f cert.pfx /p $env:WINDOWS_PFX_PASSWORD `
            /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
            "${{ matrix.name }}"
          & $signtool verify /pa "${{ matrix.name }}"
          Remove-Item cert.pfx -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-gui:
    # Phase D.2: bundle the Tauri GUI per platform via tauri-action.
    # Outputs: linux .deb + .AppImage, macOS .dmg, Windows .msi.
    # Signing certs not configured — bundles ship unsigned for v1; users
    # see the "unverified developer" prompt on first run. Document in
    # INSTALL.md. Linux .deb / .AppImage have no signing requirement.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: ''
            artifact_glob: 'gui/src-tauri/target/release/bundle/{deb,appimage}/*.{deb,AppImage}'
          - os: macos-latest
            args: '--target universal-apple-darwin'
            artifact_glob: 'gui/src-tauri/target/release/bundle/{dmg,macos}/*.{dmg,app.tar.gz}'
          - os: windows-latest
            args: ''
            artifact_glob: 'gui/src-tauri/target/release/bundle/msi/*.msi'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'gui/package-lock.json'

      - name: Install Linux GUI deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - name: Install JS deps
        working-directory: gui
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          args: ${{ matrix.args }}

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: lamquant-gui-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────
  # sbom — Phase 2.5. Emits an SPDX 2.3 + CycloneDX 1.5 SBOM of the
  # Rust dependency graph using cargo-sbom (SPDX) and cargo-cyclonedx
  # (CycloneDX, complementary format that downstream supply-chain
  # tooling — Trivy, Grype, Dependency-Track — consumes natively).
  # Both artifacts ship next to the binaries in the GH release.
  # ──────────────────────────────────────────────────────────────────
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-sbom + cargo-cyclonedx
        run: |
          cargo install cargo-sbom --locked
          cargo install cargo-cyclonedx --locked

      - name: Emit SPDX SBOM (lamquant-core)
        run: |
          cargo sbom --output-format spdx_json_2_3 \
            --cargo-package lamquant-core \
            > lamquant-core.spdx.json

      - name: Emit CycloneDX SBOM (workspace)
        run: |
          cargo cyclonedx --format json --output-cdx --spec-version 1.5
          # cargo-cyclonedx writes per-crate files inside each crate dir;
          # collect the lamquant-core one to ship with the release.
          cp lamquant-core/lamquant-core.cdx.json .

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            lamquant-core.spdx.json
            lamquant-core.cdx.json

  # ──────────────────────────────────────────────────────────────────
  # reproducible-build-verify — Phase 8 / Item G.
  # Two clean-room builds at the tag commit must hash byte-identical.
  # SOURCE_DATE_EPOCH pinned from tag-commit %ct (matches build-binaries).
  # --remap-path-prefix scrubs runner-local paths from debuginfo.
  # Failure here blocks the release: a non-reproducible tag is a
  # supply-chain signal we don't want to ship.
  # ──────────────────────────────────────────────────────────────────
  reproducible-build-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: reproducible-verify
          workspaces: lamquant-core
      - name: Verify reproducibility
        run: ./scripts/verify_reproducible_build.sh

  create-release:
    needs: [build-binaries, build-gui, sbom, reproducible-build-verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} \; > ../SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            SHA256SUMS.txt
          generate_release_notes: true

  publish-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --manifest-path lamquant-core/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --manifest-path lamquant-core/Cargo.toml --features python
      - uses: pypa/gh-action-pypi-publish@v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
