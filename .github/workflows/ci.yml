name: ci

on:
  push:
    branches: [main, "decomp/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-host:
    name: Rust host build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-host-${{ hashFiles('Cargo.lock') }}
      # NOTE: not --all-features. lamquant-weights enforces exactly-one
      # architecture feature via compile_error! (subband_v1 / subband_v2 /
      # legacy_v7_0), so --all-features is intentionally a build error.
      # Default features exercise the full host codec path.
      - name: cargo build --workspace
        run: cargo build --workspace
      # Full workspace test — runs the ~20 integration suites (conformance,
      # property_roundtrip, cross_platform_bytes, snapshot_wire_format,
      # edf_safety, lma_conformance, …) that the old `--lib`-only lane never
      # compiled, let alone ran. (A stale LMA-v1 snapshot was hiding behind
      # that gap until the suite was widened.)
      - name: cargo test --workspace
        run: cargo test --workspace
      - name: byte_equal_backends wire-format gate
        run: cargo test --test byte_equal_backends
      # The byte_equal_backends goldens are REGENERATED by the CURRENT
      # encoder, so they only prove Firmware==Desktop for today's bytes —
      # they cannot catch decode-back-compat drift (a reader change that
      # silently stops decoding files written by an OLDER encoder).
      # commit a81cd04 (2026-05-11) widened the per-window CRC scope with
      # no version gate and broke exactly that. This gate decodes a FROZEN
      # pre-a81cd04 .lml fixture and asserts it still decodes via the
      # payload-only legacy CRC fallback (and that genuine corruption is
      # still rejected). It is the dedicated old-format guard.
      - name: legacy .lml decode back-compat gate
        run: cargo test -p lamquant-lossless --test legacy_crc_decode

  core-no_std:
    # The firmware BINARY moved to the LamQuant-Firmware submodule (ADR
    # 0026 phase B.1), but the no_std build path it depends on lives HERE:
    # lamquant-lossless --no-default-features is the pure core codec
    # (lifting, lpc, golomb, rans, crc32, lml) that the MCU links. This
    # lane keeps that core no_std-clean so a new host-only module can't
    # silently break the firmware build downstream.
    name: Core no_std (riscv32imac)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imac-unknown-none-elf
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: core-no_std-${{ hashFiles('Cargo.lock') }}
      - name: cargo build -p lamquant-lossless --no-default-features
        run: cargo build -p lamquant-lossless --no-default-features --target riscv32imac-unknown-none-elf

  pytest-fast:
    name: Pytest fast tier
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install pytest numpy pyedflib mne
      - name: Build Python codec wheel
        run: |
          pip install maturin
          cd reference_implementations/python_codec && pip install -e .
      - name: Run fast tier diagnostics
        run: python3 tests/run_diagnostics.py fast

  format-check:
    name: cargo fmt + clippy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
        continue-on-error: true  # advisory until clippy debt is fixed

  fuzz-smoke:
    # The 6 libfuzzer targets guard the untrusted-input decode surface
    # (decompress, roundtrip, container_header, offset_table, lma_manifest,
    # lml_random_seek). A 30s smoke per target on every push catches a
    # crash-on-malformed-input regression without a full fuzz campaign.
    # Lives outside the host workspace (nightly + libfuzzer-sys), driven
    # explicitly from lamquant-lossless/fuzz.
    name: fuzz smoke (libfuzzer, 30s each)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Smoke each fuzz target
        working-directory: lamquant-lossless
        run: |
          for t in decompress roundtrip container_header offset_table lma_manifest lml_random_seek; do
            echo "::group::fuzz $t"
            cargo +nightly fuzz run "$t" -- -max_total_time=30
            echo "::endgroup::"
          done

  cbindgen-drift:
    # The C FFI header (include/lml.h) is generated from the `ffi` feature
    # surface; a struct/signature change that isn't regenerated is a silent
    # ABI break for C consumers. Regenerate and fail on any diff.
    name: cbindgen header drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cbindgen
        run: cargo install cbindgen --locked
      - name: Regenerate + diff include/lml.h
        working-directory: lamquant-lossless
        run: |
          cbindgen --config cbindgen.toml --crate lamquant-lossless --output include/lml.h
          git diff --exit-code include/lml.h
