name: ci

on:
  push:
    branches: [main, "decomp/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-host:
    name: Rust host build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-host-${{ hashFiles('Cargo.lock') }}
      # NOTE: not --all-features. lamquant-weights enforces exactly-one
      # architecture feature via compile_error! (subband_v1 / subband_v2 /
      # legacy_v7_0), so --all-features is intentionally a build error.
      # Default features exercise the full host codec path.
      - name: cargo build --workspace
        run: cargo build --workspace
      # Full workspace test — runs the ~20 integration suites (conformance,
      # property_roundtrip, cross_platform_bytes, snapshot_wire_format,
      # edf_safety, lma_conformance, …) that the old `--lib`-only lane never
      # compiled, let alone ran. (A stale LMA-v1 snapshot was hiding behind
      # that gap until the suite was widened.)
      - name: cargo test --workspace
        run: cargo test --workspace
      - name: DIX1 independent Python decoder gate
        run: cargo test -p lamquant-lml-optimum-v2 --test dix1_reference_decoder
      - name: byte_equal_backends wire-format gate
        run: cargo test --test byte_equal_backends
      # Current ABIR/BCS2 envelope + frozen inner LML1 wire gate. The retired
      # BCS1 compatibility path is tested in the independent legacy Adapter
      # repository and must not return to this process graph.
      - name: Current front-end and codec wire gate (archive)
        run: cargo test -p lamquant-lml --features archive --test front_end_bit_exact
      # ADR 0074 M0: the DAG-reference==fused split contract. archive-gated, so it
      # only runs when NAMED (the workspace step runs default features). Pin it, or
      # it silently never fires and stops guarding the migration's split.
      - name: ADR-0074 M0 DAG-reference==fused gate (archive)
        run: cargo test -p lamquant-lml --features archive --test dag_reference_equals_fused
      # S7b normalization parity (ADR 0069): Rust normalize.rs == Python scipy
      # pipeline on committed Q31 goldens. Also archive-gated → pin by name (it was
      # added without a CI line and was silently absent).
      - name: S7b normalization parity gate (archive)
        run: cargo test -p lamquant-lml --features archive --test normalize_parity
      - name: ABIR/BCS2 profile conformance
        run: cargo test -p lamquant-abir-codec
      - name: LMQ current-wire conformance
        run: cargo test -p lamquant-lmq
      - name: Standards Adapter semantic conformance
        run: cargo test -p lamquant-standard-adapters
      # ADR 0075: the LQTP1 training-pack wire (BFP codec + fixed-stride header) — a NEW
      # frozen golden (pack_layout_golden); never regen without a deliberate version bump.
      - name: LQTP1 tensor-pack format gate
        run: cargo test -p lamquant-lml --lib tensor_pack::tests
      # The user-facing "does a fresh binary work?" check — encode→decode→verify a
      # synthetic signal byte-exact. Regression-guards cmd_self_test (it silently broke
      # once when the codec started stamping provenance onto metadata).
      - name: lml self-test (fresh-binary sanity)
        run: cargo run -p lamquant-lml --bin lml -- self-test
      # ADR 0114 (Neural Evidence Graph): the epistemic-class type barrier. Pins
      # the crate's unit + doctest + trybuild UI suite by name so the invariant
      # "a Generated node can never reach a Measured consumer" (compile-fail,
      # E0308-pinned in tests/ui/) can't be silently dropped by a feature trim.
      - name: NEG type-barrier gate
        run: cargo test -p lamquant-neg

  core-no_std:
    # The firmware BINARY moved to the LamQuant-Firmware submodule (ADR
    # 0026 phase B.1), but the no_std build path it depends on lives HERE:
    # `lamquant-lml-mcu` (ADR 0052 Tier 1) is the pure integer codec
    # (lifting, lpc, golomb, rans, crc32, lml) that the MCU links. This lane
    # keeps that core no_std-clean so a new host-only module — or a stray
    # dep from the float Optimum crate — can't silently break the firmware
    # build downstream. (The structural guarantee: `lamquant-optimum`'s
    # `encode` feature is NEVER in this build's dependency graph.)
    name: Core no_std (riscv32imac)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imac-unknown-none-elf
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: core-no_std-${{ hashFiles('Cargo.lock') }}
      - name: cargo build -p lamquant-lml-mcu --no-default-features
        run: cargo build -p lamquant-lml-mcu --no-default-features --target riscv32imac-unknown-none-elf
      - name: cargo build -p lamquant-abir-codec --no-default-features
        run: cargo build -p lamquant-abir-codec --no-default-features --target riscv32imac-unknown-none-elf
      # Belt-and-suspenders: the optimum DECODE module must also stay no_std-clean
      # (it is the optional firmware LMO-decode module). Its `encode` feature must
      # never appear here.
      - name: cargo build -p lamquant-lml-optimum (decode, no_std)
        run: cargo build -p lamquant-lml-optimum --no-default-features --features decode --target riscv32imac-unknown-none-elf

  pytest-fast:
    name: Pytest fast tier
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install pytest numpy pyedflib mne
      - name: Build Python codec wheel
        run: |
          pip install maturin
          cd reference_implementations/python_codec && pip install -e .
      - name: Run fast tier diagnostics
        run: python3 tests/run_diagnostics.py fast

  format-check:
    name: cargo fmt + clippy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  fuzz-smoke:
    # The current libfuzzer targets guard the untrusted-input decode surface
    # (LML1 packet decode, ABIR/BCS2 open, and LMA manifest parsing). A 30s
    # smoke per target on every push catches a
    # crash-on-malformed-input regression without a full fuzz campaign.
    # Lives outside the host workspace (nightly + libfuzzer-sys), driven
    # explicitly from lamquant-lossless/fuzz.
    name: fuzz smoke (libfuzzer, 30s each)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version "^0.12" --locked
      - name: Smoke each fuzz target
        working-directory: lamquant-lossless
        run: |
          for t in decompress roundtrip container_header lma_manifest; do
            echo "::group::fuzz $t"
            cargo +nightly fuzz run "$t" -- -max_total_time=30
            echo "::endgroup::"
          done

  cbindgen-drift:
    # The C FFI header (include/lml.h) is generated from the `ffi` feature
    # surface; a struct/signature change that isn't regenerated is a silent
    # ABI break for C consumers. Regenerate and fail on any diff.
    name: cbindgen header drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cbindgen
        run: cargo install cbindgen --locked
      - name: Regenerate + diff include/lml.h
        working-directory: lamquant-lossless
        run: |
          cbindgen --config cbindgen.toml --crate lamquant-lossless --output include/lml.h
          git diff --exit-code include/lml.h

  nwb-hdf5:
    # #24: the NWB/HDF5 reader lane. Dormant until now — it needs system libhdf5
    # (the `hdf5` crate links it) + h5py (the test writes the HDF5/NWB fixture the
    # Rust reader then validates), so it never ran in CI. Install both and exercise
    # the `nwb` feature so a regression in the HDF5 read path is caught.
    name: NWB / HDF5 reader (libhdf5)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      # h5py/numpy via apt (python3-*) rather than pip — robust against the
      # PEP 668 externally-managed-environment error on newer ubuntu images.
      - name: Install libhdf5 + h5py
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev pkg-config python3-h5py python3-numpy
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: nwb-hdf5-${{ hashFiles('Cargo.lock') }}
      - name: cargo test --features nwb (nwb_reader)
        run: cargo test -p lamquant-lml --features nwb --test nwb_reader
