name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --manifest-path lamquant-core/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path lamquant-core/Cargo.toml -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path lamquant-core/Cargo.toml

      - name: Build release binary
        run: cargo build --manifest-path lamquant-core/Cargo.toml --release --bin lml

      - name: Binary smoke test
        run: |
          ls -lh target/release/lml
          target/release/lml help

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy scipy mne numba pytest pytest-cov coverage hypothesis prompt_toolkit zstandard

      - name: Run Python tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=ai_models --cov=firmware --cov=lamquant_codec \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Check coverage threshold
        run: |
          python -m coverage report --fail-under=60

      - name: Audit format consistency
        run: |
          python scripts/audit_format_consistency.py

  c-host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile C test harness
        run: |
          gcc -O2 -Wall -Wextra \
            -I tests/c_host \
            -o tests/c_host/test_c_firmware \
            tests/c_host/test_c_firmware.c -lm

      - name: Run C unit tests
        run: ./tests/c_host/test_c_firmware

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Fuzz decompress (60s)
        run: |
          cd lamquant-core
          cargo +nightly fuzz run decompress -- -max_total_time=60

      - name: Fuzz roundtrip (60s)
        run: |
          cd lamquant-core
          cargo +nightly fuzz run roundtrip -- -max_total_time=60

      - name: Generate C FFI header
        run: |
          cargo install cbindgen
          cd lamquant-core
          cbindgen --config cbindgen.toml --crate lamquant-core --output include/lml.h
          # Verify header hasn't drifted from checked-in version
          git diff --exit-code include/lml.h
