name: ci

on:
  push:
    branches: [main, "decomp/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-host:
    name: Rust host build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-host-${{ hashFiles('Cargo.lock') }}
      # NOTE: not --all-features. lamquant-weights enforces exactly-one
      # architecture feature via compile_error! (subband_v1 / subband_v2 /
      # legacy_v7_0), so --all-features is intentionally a build error.
      # Default features exercise the full host codec path.
      - name: cargo build --workspace
        run: cargo build --workspace
      - name: cargo test --workspace --lib
        run: cargo test --workspace --lib
      - name: byte_equal_backends wire-format gate
        run: cargo test --test byte_equal_backends

  firmware-no_std:
    name: Firmware no_std (riscv32imac)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imac-unknown-none-elf
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: firmware-${{ hashFiles('Cargo.lock') }}
      - name: cargo build -p lamquant-firmware --no-default-features
        run: cargo build -p lamquant-firmware --no-default-features --target riscv32imac-unknown-none-elf

  pytest-fast:
    name: Pytest fast tier
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install pytest numpy pyedflib mne
      - name: Build Python codec wheel
        run: |
          pip install maturin
          cd reference_implementations/python_codec && pip install -e .
      - name: Run fast tier diagnostics
        run: python3 tests/run_diagnostics.py fast

  format-check:
    name: cargo fmt + clippy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
        continue-on-error: true  # advisory until clippy debt is fixed
