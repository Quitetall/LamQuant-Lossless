[package]
name = "lamquant-weights"
version = "7.7.0"            # mirrors model checkpoint version
edition = "2021"
rust-version = "1.75"
description = "LamQuant TNN/SNN weights — generated from checkpoint via export_firmware.py"
license = "AGPL-3.0"
publish = false

[lib]
name = "lamquant_weights"

[features]
# Architecture variant. Mutually exclusive — pick exactly one.
default = ["subband_v1"]
subband_v1 = []
subband_v2 = []
legacy_v7_0 = []

[dependencies]
# Strictly no_std + no alloc. All `pub static` const data.
# No deps required at runtime.
