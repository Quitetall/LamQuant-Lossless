# cbindgen configuration for lamquant-core C FFI
# Generate: cbindgen --config cbindgen.toml --crate lamquant-core --output include/lml.h

language = "C"
header = """
/*
 * LML Lossless EEG Codec — C API
 *
 * Generated by cbindgen. Do not edit manually.
 * Source: lamquant-core/src/ffi.rs
 *
 * Usage:
 *   #include "lml.h"
 *   int16_t signal[21 * 2500];
 *   uint8_t buf[200000];
 *   uint32_t out_len;
 *   int rc = lml_compress(signal, 21, 2500, 0, buf, sizeof(buf), &out_len);
 *   if (rc != LML_OK) { fprintf(stderr, "%s\\n", lml_error_string(rc)); }
 */
"""
include_guard = "LML_H"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Do not modify. */"
no_includes = true
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]

[export]
include = ["LML_OK", "LML_ERROR_INVALID_INPUT", "LML_ERROR_CORRUPT_DATA", "LML_ERROR_BUFFER_TOO_SMALL", "LML_ERROR_UNSUPPORTED_VERSION", "LML_ERROR_IO"]

[fn]
rename_args = "SnakeCase"
